<div class="container">
  <header class="topo">
    <button class="btn-acao btn-voltar" routerLink="/" aria-label="Voltar para dashboard">←</button>

    <div class="top-left">
      <h1>Minhas Contas</h1>
      <div class="month-selector-wrapper">
        <button class="month-selector-btn" (click)="toggleMesDrop()">
          <span class="month-label">{{ mesSelecionado }}</span>
          <span class="dropdown-icon" [class.open]="showMesDrop">▼</span>
        </button>
        <div class="month-dropdown" [class.open]="showMesDrop">
          <button *ngFor="let mes of meses" (click)="selecionarMes(mes.value)" [disabled]="mes.disabled"
            [class.selected]="mesSelecionado === mes.value" class="month-option">
            {{ mes.label }}
          </button>
        </div>
      </div>
    </div>

    <div class="acoes">
      <button class="btn-acao" type="button" aria-label="Buscar">🔍</button>
      <button class="btn-acao btn-remover" type="button" aria-label="Remover receitas selecionadas"
        [disabled]="quantidadeSelecionada === 0 || removendoSelecionadas" (click)="removerSelecionadas()">
        🗑
      </button>
    </div>
  </header>

  <section class="resumo-card">
    <small>Total do mês</small>
    <strong>{{ total | currency:'BRL' }}</strong>
    <span>{{ receitas.length }} lançamentos</span>
  </section>

  <section class="lista-card">
    <div class="lista-head">
      <h2>Lançamentos</h2>
      <span>{{ receitas.length }} itens</span>
    </div>

    <div class="selecao-toolbar" *ngIf="receitas.length > 0">
      <label class="check-selecao">
        <input type="checkbox" [checked]="todasSelecionadas" [indeterminate]="selecaoParcial"
          (change)="alternarSelecionarTodas($event)">
        <span>Selecionar todas</span>
      </label>

      <button class="btn-remover-selecionadas" type="button" [disabled]="quantidadeSelecionada === 0 || removendoSelecionadas"
        (click)="removerSelecionadas()">
        {{ removendoSelecionadas ? 'Removendo...' : 'Remover selecionadas (' + quantidadeSelecionada + ')' }}
      </button>
    </div>

    <div class="receita" *ngFor="let item of receitas">
      <label class="check-selecao item-check" aria-label="Selecionar receita">
        <input type="checkbox" [checked]="estaSelecionada(item.id)" (click)="$event.stopPropagation()"
          (change)="alternarSelecionada(item.id, $event)">
      </label>

      <button class="receita-detalhe" type="button" (click)="abrirDetalhes(item)">
        <div class="data">{{ item.data }}</div>
        <div class="info">
          <div class="texto">
            <div class="titulo">{{ item.titulo }}</div>
            <div class="descricao">{{ item.descricao }}</div>
          </div>
          <div class="valor">+ {{ item.valor | currency:'BRL' }}</div>
        </div>
      </button>
    </div>
  </section>

  <button class="botao-flutuante" routerLink="/nova-conta" aria-label="Criar nova conta">+</button>
</div>
